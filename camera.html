<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Camera App</title>
    <style>
        #videoElement {
            width: 100%;
            height: auto;
        }
        #captureButton {
            display: block;
            margin: 10px auto;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #photoHolder {
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Web Camera App</h1>
    <video id="videoElement" autoplay></video>
    <button id="captureButton">Capture</button>
    <div id="photoHolder"></div>

    <script src="app.js"></script>
</body>
</html>
